name: CI

on:
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - 'scripts/**'
      - 'api/**'
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
      - 'api/**'

jobs:
  # ── FAST (every PR, ~90s) ───────────────────────────────────────────────────
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run Unit & Integration Tests (no mocks)
        run: npm run test          # vitest: unit + integration only

  # ── FULL (push to main only, ~3-4 min) ────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate the test XLSX
        run: node generate_test_xlsx.cjs
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run E2E Tests
        run: npx playwright test
        env:
          CI: true
