name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:
  # ── FAST (every PR, ~90s) ───────────────────────────────────────────────────
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run fetch:json
      - run: bun lint
      - run: bun typecheck
      - name: Run Unit & Integration Tests (no mocks)
        run: bun run test

  # ── FULL (push to main only, ~3-4 min) ────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-integration
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Get latest XLSX file and convert to JSON
        run: bun run fetch:json
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - run: bun run build
      - name: Run E2E Tests
        run: npx playwright test
        env:
          CI: true
